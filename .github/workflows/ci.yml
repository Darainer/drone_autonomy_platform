name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ── ROS2 build + smoke test ──────────────────
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t drone_autonomy_platform .
      - name: Run smoke test
        run: |
          docker run --rm drone_autonomy_platform \
            bash /ws/src/drone_autonomy_platform/scripts/smoke_test.sh

  # ── Agent system tests ───────────────────────
  agent-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent dependencies
        run: pip install -r agents/requirements.txt

      - name: Validate docker compose config
        run: docker compose -f docker/docker-compose.yml config --quiet

      - name: Run agent unit tests (mock mode — no API key required)
        env:
          AGENT_MOCK: "true"
          WORKSPACE: "/tmp/test-workspace"
        run: pytest agents/tests/ -v --tb=short

      - name: Build agent Docker image
        run: |
          DOCKER_UID=1000 DOCKER_GID=1000 docker compose -f docker/docker-compose.yml build orchestrator

      - name: Run mock end-to-end workflow
        run: |
          docker compose -f docker/docker-compose.yml up -d --wait temporal-db temporal

          DOCKER_UID=1000 DOCKER_GID=1000 AGENT_MOCK=true \
            docker compose -f docker/docker-compose.yml up -d orchestrator ros2-worker sim-worker

          # Brief pause for workers to register with Temporal — no healthcheck possible for this
          sleep 8

          docker compose -f docker/docker-compose.yml exec -T orchestrator \
            python3 scripts/submit_task.py \
              "Write a placeholder file to launch/ci-test.md" \
              --plan '{"summary":"CI mock test","safety_critical":false,"affected_packages":[],"steps":[{"agent":"infra","task_queue":"orchestrator","action":"Write a placeholder file to launch/ci-test.md","depends_on":[]}]}' \
              --timeout 60 || {
            echo "--- orchestrator logs ---"
            docker compose -f docker/docker-compose.yml logs orchestrator
            docker compose -f docker/docker-compose.yml down
            exit 1
          }

          docker compose -f docker/docker-compose.yml down
