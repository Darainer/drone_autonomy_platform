# docker-compose.agents.yaml
# 
# Agent orchestration layer for drone_autonomy_platform
# Runs alongside your existing docker/docker-compose.yml
#
# Usage:
#   docker compose -f docker-compose.agents.yaml up -d
#   open http://localhost:8080  # Temporal UI
#
# Requirements:
#   - Docker with Compose V2
#   - ANTHROPIC_API_KEY in .env
#   - (Optional) NVIDIA GPU for ml-worker

services:
  # ═══════════════════════════════════════════
  # Temporal Server — lightweight local setup
  # ═══════════════════════════════════════════
  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=sqlite
    volumes:
      - temporal-data:/var/lib/temporal
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy

  # ═══════════════════════════════════════════
  # Orchestrator Worker
  # Routes intent → workflow → agent chain
  # ═══════════════════════════════════════════
  orchestrator:
    build:
      context: .
      dockerfile: agents/orchestrator/Dockerfile
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
    volumes:
      - .:/workspace
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # ROS2 Dev Worker
  # Handles all domain agents (perception, nav, control, etc.)
  # ═══════════════════════════════════════════
  ros2-worker:
    build:
      context: .
      dockerfile: agents/ros2-worker/Dockerfile
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
    volumes:
      - .:/workspace
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # Simulation Worker
  # Gazebo + PX4 SITL test execution
  # ═══════════════════════════════════════════
  sim-worker:
    build:
      context: .
      dockerfile: agents/sim-worker/Dockerfile
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
      - DISPLAY=${DISPLAY:-:0}
    volumes:
      - .:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # ML Pipeline Worker
  # Training, ONNX export, TensorRT builds
  # ═══════════════════════════════════════════
  ml-worker:
    build:
      context: .
      dockerfile: agents/ml-worker/Dockerfile
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
    volumes:
      - .:/workspace
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════════════════════════════════════
  # Deploy Worker
  # Cross-compile + push to Orin Nano
  # ═══════════════════════════════════════════
  deploy-worker:
    build:
      context: .
      dockerfile: agents/deploy-worker/Dockerfile
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
      - ORIN_HOST=${ORIN_HOST:-}
      - ORIN_USER=${ORIN_USER:-jetson}
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.ssh:/root/.ssh:ro
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

volumes:
  temporal-data:
