services:
  # ═══════════════════════════════════════════
  # Your existing dev container — unchanged
  # ═══════════════════════════════════════════
  dev:
    profiles: [hardware]
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: drone_autonomy_platform:dev
    container_name: drone_autonomy_platform_dev
    network_mode: host
    ipc: host
    privileged: true
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    volumes:
      - ..:/ros2_ws/src/drone_autonomy_platform
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - FCU_URL=/dev/ttyUSB0:921600
      - ROS_DOMAIN_ID=1
    command: /bin/bash
    tty: true
    stdin_open: true

  # ═══════════════════════════════════════════
  # Temporal Server — agent orchestration engine
  # ═══════════════════════════════════════════
  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    depends_on:
      temporal-db:
        condition: service_started
  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      temporal:
        condition: service_started

  # ═══════════════════════════════════════════
  # Agent Workers — all share the same workspace
  # ═══════════════════════════════════════════
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agents
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
      - AGENT_MOCK=${AGENT_MOCK:-false}
    volumes:
      - ..:/workspace
    depends_on:
      temporal:
        condition: service_started
    command: python -m agents.orchestrator.worker
    restart: unless-stopped

  ros2-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agents
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
      - AGENT_MOCK=${AGENT_MOCK:-false}
    volumes:
      - ..:/workspace
    depends_on:
      temporal:
        condition: service_started
    command: python -m agents.ros2_worker.worker
    restart: unless-stopped

  sim-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agents
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
      - AGENT_MOCK=${AGENT_MOCK:-false}
    volumes:
      - ..:/workspace
    depends_on:
      temporal:
        condition: service_started
    command: python -m agents.sim_worker.worker
    restart: unless-stopped

  ml-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agents
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
      - AGENT_MOCK=${AGENT_MOCK:-false}
    volumes:
      - ..:/workspace
    depends_on:
      temporal:
        condition: service_started
    command: python -m agents.ml_worker.worker
    restart: unless-stopped

  deploy-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agents
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WORKSPACE=/workspace
      - AGENT_MOCK=${AGENT_MOCK:-false}
      - ORIN_HOST=${ORIN_HOST:-}
      - ORIN_USER=${ORIN_USER:-jetson}
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.ssh:/root/.ssh:ro
    depends_on:
      temporal:
        condition: service_started
    command: python -m agents.deploy_worker.worker
    restart: unless-stopped

volumes:
  temporal-data:
