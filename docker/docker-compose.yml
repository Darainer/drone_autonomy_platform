# LLM backend env vars (set in .env or shell):
#   LLM_BACKEND=anthropic        (default)
#   LLM_BACKEND=openai_compat    + LLM_BASE_URL + LLM_API_KEY + LLM_MODEL
#
#   Moonshot K2:  LLM_BASE_URL=https://api.moonshot.cn/v1  LLM_MODEL=kimi-k2
#   Ollama local: LLM_BASE_URL=http://host.docker.internal:11434/v1  LLM_MODEL=qwen2.5-coder:14b

x-agent-env: &agent-env
  TEMPORAL_ADDRESS: temporal:7233
  WORKSPACE: /workspace
  AGENT_MOCK: ${AGENT_MOCK:-false}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  LLM_BACKEND: ${LLM_BACKEND:-anthropic}
  LLM_BASE_URL: ${LLM_BASE_URL:-}
  LLM_API_KEY: ${LLM_API_KEY:-}
  LLM_MODEL: ${LLM_MODEL:-}
  GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-}
  GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-}
  GIT_COMMITTER_NAME: ${GIT_COMMITTER_NAME:-}
  GIT_COMMITTER_EMAIL: ${GIT_COMMITTER_EMAIL:-}

x-agent-build: &agent-build
  context: ..
  dockerfile: docker/Dockerfile.agents
  args:
    UID: ${DOCKER_UID:-1000}
    GID: ${DOCKER_GID:-1000}

services:
  # ═══════════════════════════════════════════
  # Development container — hardware integration
  # ═══════════════════════════════════════════
  dev:
    profiles: [hardware]
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    image: drone_autonomy_platform:dev
    container_name: drone_autonomy_platform_dev
    network_mode: host
    ipc: host
    privileged: true
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    volumes:
      - ..:/ros2_ws/src/drone_autonomy_platform
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - DISPLAY=${DISPLAY:-}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - FCU_URL=/dev/ttyUSB0:921600
      - ROS_DOMAIN_ID=1
    command: /bin/bash
    tty: true
    stdin_open: true

  # ═══════════════════════════════════════════
  # Temporal Server — agent orchestration engine
  # ═══════════════════════════════════════════
  temporal-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - temporal-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-db
    depends_on:
      temporal-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z $(hostname -i) 7233"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy

  # ═══════════════════════════════════════════
  # Agent Workers — all share the same workspace
  # ═══════════════════════════════════════════
  orchestrator:
    build:
      <<: *agent-build
    environment:
      <<: *agent-env
    volumes:
      - ..:/workspace
    depends_on:
      temporal:
        condition: service_healthy
    command: python -m agents.orchestrator.worker
    restart: unless-stopped

  ros2-worker:
    build:
      <<: *agent-build
    environment:
      <<: *agent-env
    volumes:
      - ..:/workspace
    depends_on:
      temporal:
        condition: service_healthy
    command: python -m agents.ros2_worker.worker
    restart: unless-stopped

  sim-worker:
    build:
      <<: *agent-build
    environment:
      <<: *agent-env
    volumes:
      - ..:/workspace
    depends_on:
      temporal:
        condition: service_healthy
    command: python -m agents.sim_worker.worker
    restart: unless-stopped

  ml-worker:
    build:
      <<: *agent-build
    environment:
      <<: *agent-env
    volumes:
      - ..:/workspace
    depends_on:
      temporal:
        condition: service_healthy
    command: python -m agents.ml_worker.worker
    restart: unless-stopped

  deploy-worker:
    build:
      <<: *agent-build
    environment:
      <<: *agent-env
      ORIN_HOST: ${ORIN_HOST:-}
      ORIN_USER: ${ORIN_USER:-jetson}
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.ssh:/home/agent/.ssh:ro
    depends_on:
      temporal:
        condition: service_healthy
    command: python -m agents.deploy_worker.worker
    restart: unless-stopped

volumes:
  temporal-data:
